name: Update Star Counts

on:
  schedule:
    - cron: "17 4 * * *" # daily ~04:17 UTC
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/update-stars.yml"
      - ".github/scripts/update_stars.py"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Refresh star counts in README
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_USER: CacinieP
        run: python .github/scripts/update_stars.py
      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "chore: auto-update star counts"
            git push
          fi
